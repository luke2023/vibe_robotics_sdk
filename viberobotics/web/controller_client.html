<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Keymap</title>
</head>

<body style="font-family:sans-serif">
    <h3>Mode control</h3>
    <div>Current mode: <strong id="mode-display">-</strong></div>
    <div style="margin: 8px 0;">
        <button data-mode="NONE">None</button>
        <button data-mode="PD_STAND">PD Stand</button>
        <button data-mode="RL">RL</button>
    </div>
    <h3>Vector</h3>
    <p>Click this page, then tap WASD. Key releases will move the vector.</p>
    <pre id="status"></pre>
    <h3>Reset</h3>
    <p>Clicking the button below will reset the vector and mode to default values.</p>
    <button id="reset-button" onclick="postReset()">Reset</button>
    <script>
        const status = document.getElementById("status");
        const modeDisplay = document.getElementById("mode-display");
        const allowed = new Set(["KeyW", "KeyA", "KeyS", "KeyD", "KeyQ", "KeyE"]);
        const moves = {
            KeyW: { x: 0, y: 0.1, yaw: 0 },
            KeyS: { x: 0, y: -0.1, yaw: 0 },
            KeyA: { x: -0.1, y: 0, yaw: 0 },
            KeyD: { x: 0.1, y: 0, yaw: 0 },
            KeyQ: { x: 0, y: 0, yaw: -0.1 },
            KeyE: { x: 0, y: 0, yaw: 0.1 },
        };
        const vector = { x: 0, y: 0, yaw: 0 };
        let mode = "NONE";
        const HEARTBEAT_INTERVAL_MS = 300;
        const MAX_CONSECUTIVE_MISSED_HEARTBEATS = 3;
        let missedHeartbeats = 0;
        let heartbeatTimer = null;
        let closingTab = false;
        const round1 = (v) => Math.round(v * 10) / 10;

        async function updateFromResponse(res) {
            if (res && res.ok) {
                try {
                    const data = await res.json();
                    if (data && data.vector) {
                        vector.x = data.vector.x;
                        vector.y = data.vector.y;
                        vector.yaw = data.vector.yaw;
                    }
                    if (data && data.mode) {
                        mode = data.mode;
                    }
                    renderStatus();
                } catch (e) {
                    // ignore parse errors
                    console.log(e);
                }
            }
            
        }

        async function postState(state) {
            const res = await fetch("/state", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(state),
                keepalive: true,
            }).catch(() => null);
            await updateFromResponse(res);
        }

        async function postMode(newMode) {
            const res = await fetch("/mode", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ mode: newMode }),
                keepalive: true,
            }).catch(() => null);
            await updateFromResponse(res);
        }

        async function postReset() {
            const res = await fetch("/reset", {
                method: "POST",
                keepalive: true,
            }).catch(() => null);
            await updateFromResponse(res);
        }

        function renderStatus() {
            modeDisplay.textContent = mode;
            status.textContent = JSON.stringify(vector, null, 2);
        }

        async function sendHeartbeat() {
            if (closingTab) return;
            const res = await fetch("/heartbeat", {
                cache: "no-store",
            }).catch(() => null);
            if (res && res.ok) {
                missedHeartbeats = 0;
            } else {
                missedHeartbeats += 1;
            }
            if (missedHeartbeats >= MAX_CONSECUTIVE_MISSED_HEARTBEATS) {
                closingTab = true;
                clearInterval(heartbeatTimer);
                window.close();
                setTimeout(() => {
                    document.body.textContent = "Heartbeat to controller lost. Please close this tab.";
                }, 200);
            }
        }

        function startHeartbeat() {
            if (heartbeatTimer) return;
            heartbeatTimer = setInterval(sendHeartbeat, HEARTBEAT_INTERVAL_MS);
            sendHeartbeat();
        }

        window.addEventListener("keydown", (e) => {
            if (!allowed.has(e.code)) return;
            e.preventDefault();
        });

        window.addEventListener("keyup", (e) => {
            if (!allowed.has(e.code)) return;
            e.preventDefault();
            const move = moves[e.code];
            if (move) {
                vector.x = round1(vector.x + move.x);
                vector.y = round1(vector.y + move.y);
                vector.yaw = round1(vector.yaw + move.yaw);
            }
            postState({ vector: vector, t: performance.now() });
        });

        document.querySelectorAll("[data-mode]").forEach((btn) => {
            btn.addEventListener("click", () => postMode(btn.dataset.mode));
        });

        async function initStatus() {
            const res = await fetch("/status").catch(() => null);
            await updateFromResponse(res);
        }

        initStatus();
        startHeartbeat();

    </script>
</body>

</html>
